[[default.rules]]
format.preset = "keyword"
patterns = [
    # Brace delimiters, {}
    { regexp = '({).*(})'},
    # Constraints, `B`ond, `A`ngle, `D`ihedral, X, Y, Z
    # Specifically matches the `{` character, the `[BADXYZ]` character,
    # the `C` character, and the `}` character
    { regexp = '\s(?:({) ([BADXYZ]) )(?:[-\+]?[\.0-9]+(?:[eEdD][-\+]?[\.0-9]+)? ?)+(?: (C) (}))\s' },
    # xTB methods
    { regexp = '\b((?:Native-)?GFN[012]-xTB)\s', caseSensitive = false },
    # NDO Methods (ZNNDO, ZINDO, etc.)
    { regexp = '\b(Z[IN][ND]DO\/[12S])\s', caseSensitive = false },
    # SCF and Opt convergence criteria
    { regexp = '\b((?:Sloppy|Loose|Medium|Strong|Tight|VeryTight|Extreme){1}(?:SCF|Opt){1})\s', caseSensitive = false },
    # RHF, UHF, ROHF, RKS, UKS, ROKS
    { regexp = '\b((?:R|U|RO){1}(?:HF|KS){1})\s', caseSensitive = false },
    # Print levels
    { regexp = '\b((?:Mini|Small|Normal|Large){1}Print)\s', caseSensitive = false },
    # DEFGRIDn
    { regexp = '\b(DEFGRID[123]{1})\s', caseSensitive = false },
    # DKHn
    { regexp = '\b(DKH[12]{1})\s', caseSensitive = false },
    # PNO settings
    { regexp = '\b((?:Loose|Normal|Tight){1}PNO)\s', caseSensitive = false },
    # Avoid capturing RI-<method>
    { regexp = '\b(RI){1}\h', caseSensitive = false},
    # Dn dispersion corrections
    { regexp = '\b(D[34](?:BJ|ZERO|0|TZ)?)\s', caseSensitive = false },
    # VV10 NL correction
    { regexp = '\b((?:SC)?NL)\s', caseSensitive = false },
    # SCFCONV<n>
    { regexp = '\b(SCFCONV[0-9]+)\s', caseSensitive = false},
    # Spin-Orbit Coupling
    { regexp = '\b((?:RI-)?SOMF(?:\([14]X\))?)\s', caseSensitive = false },
    { regexp = '\b(VEff(?:\(-2X\))?-SOC)\s', caseSensitive = false },
    # Storage formats for numbers
    { regexp = '\b((?:U?C)?(?:Float|Double))\s', caseSensitive = false },
    # Population analysis
    { regexp = '\b(ChElPG(?:Large)?)\s', caseSensitive = false },
    { regexp = '\b((?:No)?Hirshfeld)\s', caseSensitive = false },
    { regexp = '\b((?:No)?Loewdin)\s',   caseSensitive = false },
    { regexp = '\b((?:No)?Mayer)\s',     caseSensitive = false },
    { regexp = '\b((?:No)?Mulliken)\s',  caseSensitive = false },
    { regexp = '\b((?:No)?NPA)\s',       caseSensitive = false },
    { regexp = '\b((?:No)?NBO)\s',       caseSensitive = false },
    { regexp = '\b((?:All|No|(?:No)?Reduced)?Pop)\s', caseSensitive = false },
    # NEB
    { regexp = '\b((?:Fast-|Loose-|Tight-)?NEB(?:-CI|-TS|-IDPP)?)\s', caseSensitive = false },
    # Other simple input keywords
    { regexp = '\b(SP)\s',               caseSensitive = false},
    { regexp = '\b(EnGrad)\s',           caseSensitive = false},
    { regexp = '\b(Opt)\s',              caseSensitive = false},
    { regexp = '\b(OptTS)\s',            caseSensitive = false},
    { regexp = '\b(Freq)\s',             caseSensitive = false},
