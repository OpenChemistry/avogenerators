[[solvent.rules]]
format.preset = "keyword"
patterns = [
    # CPCM/SMD/COSMO and the parentheses after them
    { regexp = '\b(CPCMC?|SMD|COSMORS){1}(\()[\w, -]*(\))\s', caseSensitive = false },
]

