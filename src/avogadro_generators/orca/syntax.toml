[[default.rules]]
format.preset = "num_literal"
patterns = [
    # Matches numbers in either typical base-10 positional notation
    # or in scientific notation. The `[-\+]?` blocks are for positive
    # and negative signs. The `[eEdD]` block is for scientific format.
    # The `[\.0-9]+` block is for a decimal point follow by 1 or more
    # numbers.
    { regexp = '\s([-\+]?[\.0-9]+(?:[eEdD][-\+]?[\.0-9]+)?)\b' },
]

[[default.rules]]
format.preset = "str_literal"
patterns = [
    { regexp = '\b(True)\b', caseSensitive = false },
    { regexp = '\b(False)\b', caseSensitive = false },
    # Atomic Symbols.
    # The pattern `(?<!{)\s` asserts that there are no { characters
    # preceding the atomic symbol. This is to avoid situations like
    # in the constraints block where you can have { B ... C }.
    # The latter part of that, `C }`, is avoided by the pattern
    # `(?:\s(?!})| ?{ ?)`, which disallows for `C }` but will allow for
    # something like `C{...` or `C{ ...` or `C {...` or `C { ...`
    { regexp = '(?<!{)\s(H)(?:\s(?!})| ?{ ?)'  },
    { regexp = '(?<!{)\s(He)(?:\s(?!})| ?{ ?)' },
    { regexp = '(?<!{)\s(Li)(?:\s(?!})| ?{ ?)' },
